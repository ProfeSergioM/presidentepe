let lbCache  = [];

async function fetchLB() {
  if (sb) {
    try {
      const { data } = await sb.from('leaderboard')
        .select('name,time_secs,score')
        .order('time_secs', { ascending:false })
        .limit(5);
      if (data) { lbCache = data.map(r=>({name:r.name,time:r.time_secs,score:r.score})); lbLoaded=true; return; }
    } catch(e) { console.warn('fetchLB error', e); }
  }
  // fallback local
  try { lbCache = JSON.parse(localStorage.getItem('pres_lb')||'[]'); } catch(e){ lbCache=[]; }
  lbLoaded = true;
}

async function pushLB(name, time, score) {
  // always write local backup
  try {
    const loc = JSON.parse(localStorage.getItem('pres_lb')||'[]');
    loc.push({name,time,score}); loc.sort((a,b)=>b.time-a.time); loc.splice(5);
    localStorage.setItem('pres_lb', JSON.stringify(loc));
  } catch(e){}

  if (sb) {
    try {
      await sb.from('leaderboard').insert([{name, time_secs:time, score}]);
    } catch(e) { console.warn('pushLB error', e); }
  }
  await fetchLB(); // refresh cache
}

let audioCtx;
function getAC() {
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function tone(freq,dur,type='square',vol=0.25,delay=0) {
  try {
    const ac=getAC(),osc=ac.createOscillator(),g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.value=freq; osc.type=type;
    const t=ac.currentTime+delay;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    osc.start(t); osc.stop(t+dur+0.05);
  } catch(e){}
}

// ── PARTICLES ────────────────────────────────────────
const particles=[];
function burst(x,y,color,n=8,speed=150) {
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+rnd(-0.3,0.3), sp=rnd(speed*0.5,speed);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:rnd(1.2,2),sz:rnd(3,7),color});
  }
}
function updateParticles(dt) {
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=250*dt; p.life-=p.decay*dt;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles() {
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color; ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
    ctx.restore();
  });
}

// ── SHAKE ────────────────────────────────────────────
let shakeAmt=0, shakeX=0, shakeY=0;
function shake(n){ shakeAmt=Math.max(shakeAmt,n); }
function updateShake(dt) {
  shakeAmt=Math.max(0,shakeAmt-shakeAmt*8*dt);
  shakeX=(Math.random()-0.5)*shakeAmt; shakeY=(Math.random()-0.5)*shakeAmt;
}

}
function drawFloats() {

}

// ── SPAWN ────────────────────────────────────────────
function spawnEntity(forcedType=null) {
  let chosen = forcedType;
  if (!chosen) {
    const pool=[];
    for(const [type,data] of Object.entries(TYPES)){
      if(data.weight===0) continue; // tweet is external
      if(type==='escandalo'&&G.time<45) continue;
      pool.push({type,weight:data.weight});
    }
    const total=pool.reduce((s,p)=>s+p.weight,0);
    let r=Math.random()*total; chosen=pool[0].type;
    for(const p of pool){ r-=p.weight; if(r<=0){chosen=p.type;break;} }
  }
  const data=TYPES[chosen];
  let ex,ey;
  const edge=Math.random();
  if(edge<0.35){ ex=rnd(40,GW-40); ey=62; }
  else if(edge<0.68){ ex=28; ey=rnd(80,GH-80); }
  else { ex=GW-28; ey=rnd(80,GH-80); }
  const dx=DESK_X-ex, dy=DESK_Y-ey, d=Math.sqrt(dx*dx+dy*dy);
  const sp = data.speed * (chosen==='tweet' ? 1.0 : G.speedMult);
  G.entities.push({
    type:chosen, x:ex, y:ey, vx:(dx/d)*sp, vy:(dy/d)*sp,
    r: chosen==='tweet'?13 : chosen==='protesta'?24 : chosen==='escandalo'?26 : chosen==='maletin'?22 : 16,
    wobble:0, wt:0,
  });
}

// ── APPROVAL ─────────────────────────────────────────
function changeApproval(delta,x,y) {
  G.approval=Math.max(0,Math.min(100,G.approval+delta));
  if(x!==undefined) addFloat(x,y,delta>0?`+${delta}`:`${delta}`,delta>0?'#00FF88':C.red);
  if(G.approval<=0&&G.state==='playing') triggerGameOver();
}

// ── UPDATE ───────────────────────────────────────────
function updateEntities(dt) {
  for(let i=G.entities.length-1;i>=0;i--){
    const e=G.entities[i];
    e.x+=e.vx*dt; e.y+=e.vy*dt; e.wt+=dt*4; e.wobble=Math.sin(e.wt)*0.18;
    if(dist(e.x,e.y,DESK_X,DESK_Y)<52){
      G.entities.splice(i,1);
      const data=TYPES[e.type];
      if(data.hitDmg>0){
        changeApproval(-data.hitDmg,e.x,e.y);
        shake(data.hitDmg>=25?22:data.hitDmg>20?18:10);
        sfx.hit();
        if(e.type==='tomate'){
          // ¡SPLAT! — explosión de tomate sobre el presidente
          burst(DESK_X,DESK_Y,'#EE1111',20,200);
          burst(DESK_X,DESK_Y,'#FF6666',12,120);
          addFloat(DESK_X,DESK_Y-50,'💥 ¡SPLAT!','#FF3333');
          shake(14);
        } else if(e.type==='tweet'){
          shake(25); burst(DESK_X,DESK_Y,'#FF4444',16,180);
        }
        G.presJitter=true; setTimeout(()=>{G.presJitter=false;},400);
      } else if(e.type==='maletin'){
        changeApproval(-data.missDmg,e.x,e.y);
      }
      if(e.type!=='tomate') burst(e.x,e.y,TYPES[e.type].color,6); continue;
    }
    if(e.x<-70||e.x>GW+70||e.y<-70||e.y>GH+70) G.entities.splice(i,1);
  }
}

function updateDifficulty() {
  const lv=Math.floor(G.time/18)+1; // level every 18s ★ faster
  if(lv!==G.level){
    G.level=lv;
    G.speedMult=1.0+(lv-1)*0.07;           // curva suave: +7% por nivel
    G.spawnInterval=Math.max(0.40, 0.85-(lv-1)*0.05); // -0.05s por nivel
    addFloat(GW/2,GH/2-100,`⬆ NIVEL ${lv}`,C.gold);
    sfx.levelup();
    if(lv%5===0&&lv!==G.lastElectionLevel){
      G.lastElectionLevel=lv;
      setTimeout(triggerElection,600);
    }
  }
}

function updateTweetTimer(dt) {
  if(G.state!=='playing') return;
  G.tweetTimer-=dt;
  if(G.tweetTimer<=0){
    // Interval shrinks with level: 9–14s early, 4–7s late
    const base=Math.max(6, 18-G.level*0.7); // tweets menos frecuentes early
    G.tweetTimer=rnd(base*0.7, base*1.3);
    spawnTweet();
  }
  if(G.tweetWarningTimer>0) G.tweetWarningTimer-=dt;
}

function updateElection(dt) {
  const e=G.election;
  if(e.voted){
    e.resultTimer+=dt;
    if(e.resultTimer>2.2){
      if(e.result==='win'){
        G.state='playing';
        G.approval=Math.max(G.approval,60);
        G.spawnTimer=0;
        G.tweetTimer=rnd(6,11); // reset tweet timer after election
      } else { triggerGameOver(); }
    }
    if(e.result==='win') burst(rnd(40,GW-40),rnd(120,GH-120),Math.random()>.5?C.gold:'#00FF88',3,80);
    return;
  }
  e.trail.push(e.pos);
  if(e.trail.length>10) e.trail.shift();
  e.pos+=e.dir*e.speed*dt;
  if(e.pos>=100){ e.pos=100; e.dir=-1; e.bounces++; sfx.bounce(); shake(4); }
  if(e.pos<=0)  { e.pos=0;   e.dir=1;  e.bounces++; sfx.bounce(); shake(4); }
  if(e.bounces>=e.maxBounces){ e.voted=true; e.result='lose'; sfx.elecLose(); shake(20); }
}

// ── TAP HANDLING ─────────────────────────────────────
function handleTap(cx,cy) {
  const rect=canvas.getBoundingClientRect();
  const gx=(cx-rect.left)/scale, gy=(cy-rect.top)/scale;
  if(G.state==='menu'){
    // Solo iniciar si toca el botón "TOCA PARA EMPEZAR" (centrado en y=410, 210×48px)
    if(gx>GW/2-105 && gx<GW/2+105 && gy>386 && gy<434) startGame();
    return;
  }
  if(G.state==='election_confirm'){
    // Solo el botón LISTO (centrado en y=GH-148, 220×60px)
    if(gx>GW/2-110&&gx<GW/2+110&&gy>GH-178&&gy<GH-118) startElection();
    return;
  }
  if(G.state==='election'){ if(!G.election.voted) voteElection(); return; }
  if(G.state==='gameover'&&G.goPhase==='board'){
    if(gx>GW/2-95&&gx<GW/2+95&&gy>GH-108&&gy<GH-68) restartGame();
    return;
  }
  if(G.state!=='playing') return;
  let best=null, bestD=Infinity;
  for(const e of G.entities){
    const d=dist(gx,gy,e.x,e.y);
    if(d<e.r+18&&d<bestD){ best=e; bestD=d; }
  }
  if(best){
    G.entities.splice(G.entities.indexOf(best),1);
    const data=TYPES[best.type];
    if(best.type==='maletin'){
      changeApproval(data.tapHeal,best.x,best.y); burst(best.x,best.y,C.gold,14,120); sfx.collect();
    } else {
      burst(best.x,best.y,data.color, best.type==='tweet'?16:9);
      G.score+=data.pts;
      addFloat(best.x,best.y-20,`+${data.pts}`, best.type==='tweet'?C.gold:C.white);
      sfx.tap();
      if(best.type==='tweet') addFloat(best.x,best.y-42,'✓ ¡TWEET BLOQUEADO!','#00FF88');
    }
  } else {
    burst(gx,gy,'rgba(255,255,255,0.6)',3,60);
  }
}

function voteElection() {
  const e=G.election; if(e.voted) return;
  e.voted=true; e.result=e.pos>=e.threshold?'win':'lose';
  if(e.result==='win'){ sfx.elecWin(); burst(GW/2,GH/2,C.gold,20,200); }
  else { sfx.elecLose(); shake(20); burst(GW/2,GH/2,C.red,16,160); }
}

canvas.addEventListener('touchstart',e=>{ e.preventDefault(); for(const t of e.changedTouches) handleTap(t.clientX,t.clientY); },{passive:false});

    if(!lbLoaded){ ptext('Guardando…',GW/2,300,11,'#888'); }
    else {
      const medals=['🥇','🥈','🥉','4.','5.'];
      lbCache.forEach((e,i)=>{
        const hi=G.lastLBEntry&&e.name===G.lastLBEntry;
        ptext(`${medals[i]} ${e.name}`,GW/2,294+i*44,13,hi?C.gold:C.white);
        ptext(`${fmt(e.time)} · ${e.score} pts`,GW/2,312+i*44,10,hi?'#FFE88A':'#aaa');
      });
    }
    const p=0.96+Math.sin(Date.now()/350)*0.04;
    ctx.save(); ctx.translate(GW/2,GH-88); ctx.scale(p,p);
    ctx.fillStyle=C.red; ctx.fillRect(-95,-22,190,44);
    ctx.strokeStyle=C.gold; ctx.lineWidth=2; ctx.strokeRect(-95,-22,190,44);
    ctx.restore();
    ptext('¡JUGAR DE NUEVO!',GW/2,GH-88,13,C.white);
  }
}

let last=0;
function loop(ts) {
  const dt=Math.min((ts-last)/1000,0.1); last=ts;
  ctx.save(); ctx.scale(scale,scale); ctx.translate(shakeX,shakeY);

  if(G.state==='menu'){
    drawMenu();
  } else if(G.state==='election_confirm'){
    updateShake(dt); updateParticles(dt);
    drawOffice(); drawDesk(DESK_X,DESK_Y); drawPresident(DESK_X,DESK_Y-28,false);
    drawElectionConfirm(); drawParticles();
  } else if(G.state==='playing'){
    G.time+=dt;
    updateDifficulty(); updateShake(dt); updateTweetTimer(dt);
    G.spawnTimer+=dt;
    if(G.spawnTimer>=G.spawnInterval){
      G.spawnTimer=0; spawnEntity();
      if(G.level>=4&&Math.random()<0.45) spawnEntity();
      if(G.level>=7&&Math.random()<0.35) spawnEntity();
    }
    updateEntities(dt); updateParticles(dt); updateFloats(dt);
    drawOffice(); drawDesk(DESK_X,DESK_Y); drawPresident(DESK_X,DESK_Y-28,G.presJitter);
    for(const e of G.entities){
      ctx.save();
      if(e.type==='protesta')       drawProtesta(e.x,e.y,e.wobble);
      else if(e.type==='tomate')    drawTomate(e.x,e.y,e.wobble);
      else if(e.type==='maletin')   drawMaletin(e.x,e.y,1+Math.sin(e.wt*2)*0.06);
      else if(e.type==='escandalo') drawEscandalo(e.x,e.y,e.wobble);
      else if(e.type==='tweet')     drawTweet(e.x,e.y,e.wt);
      ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r+16,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
    drawParticles(); drawFloats(); drawHUD();
  } else if(G.state==='election'){
    updateElection(dt); updateShake(dt); updateParticles(dt);
    drawOffice(); drawElection(); drawParticles();
  } else if(G.state==='gameover'){
    updateShake(dt);
    drawOffice(); drawDesk(DESK_X,DESK_Y); drawPresident(DESK_X,DESK_Y-28,false);
    drawGameOver();
  }
  ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{ last=t; requestAnimationFrame(loop); });
</script>
